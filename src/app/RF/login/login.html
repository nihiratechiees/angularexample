<form [formGroup]="loginform" (ngSubmit)="ProceedLogin()">
    <mat-card>
        <mat-card-header>
            <h1>User Login Form</h1>
        </mat-card-header>
        <mat-card-content>
            <mat-form-field>
                <mat-label>Username</mat-label>
                <input matInput formControlName="username">
                 <mat-error>Username is required</mat-error>
            </mat-form-field>
            <mat-form-field>
                <mat-label>Password</mat-label>
                <input matInput type="password" formControlName="password">
                <mat-error>Password is required</mat-error>
            </mat-form-field>
            
        </mat-card-content>
        <mat-card-actions>
            <button type="submit" [disabled]="loginform.invalid" matButton="filled">Login</button>
            <a type="button" (click)="redirectToRegister()" matButton>New User?</a>
        </mat-card-actions>
    </mat-card>
</form>
