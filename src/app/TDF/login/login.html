<form #loginForm="ngForm" (ngSubmit)="ProceedLogin(loginForm)">
    <mat-card>
        <mat-card-header>
            <h1>User Login Form</h1>
        </mat-card-header>
        <mat-card-content>
            <mat-form-field>
                <mat-label>Username</mat-label>
                <input #username="ngModel" matInput type="text" name="username" [(ngModel)]="loginobj.username" required
                    >
                @if(username.invalid && username.touched){
                <mat-error>Username is required and must be at least 5 characters long.</mat-error>
                }
            </mat-form-field>
            <mat-form-field>
                <mat-label>Password</mat-label>
                <input #password="ngModel" matInput type="password" name="password" [(ngModel)]="loginobj.password"
                    required >
                @if(password.invalid && password.touched){
                <mat-error>Password is required and must be at least 8 characters long.</mat-error>
                }
            </mat-form-field>
            
        </mat-card-content>
        <mat-card-actions>
            <button type="submit" [disabled]="loginForm.invalid" matButton="filled">Login</button>
            <a type="button" (click)="redirectToRegister()" matButton>New User?</a>
        </mat-card-actions>
    </mat-card>
</form>
