<form [formGroup]="employeeform" (ngSubmit)="Save()">
    <mat-card>
        <mat-card-header>
            <div class="header">
                <h1>Create Employee Form</h1>
                <button style="float: right;" type="submit" matButton="filled">Save Employee</button>
            </div>

        </mat-card-header>
        <mat-card-content>
            <mat-form-field class="mat-50">
                <mat-label>First Name</mat-label>
                <input matInput formControlName="firstname">
            </mat-form-field>
            <mat-form-field class="mat-50">
                <mat-label>Last Name</mat-label>
                <input matInput formControlName="lastname">
            </mat-form-field>
            <mat-form-field class="mat-50">
                <mat-label>Mobile Number</mat-label>
                <input matInput formControlName="mobileno">
            </mat-form-field>
            <mat-form-field class="mat-50">
                <mat-label>Email</mat-label>
                <input matInput formControlName="email">
            </mat-form-field>
            <mat-form-field>
                <mat-label>Remarks</mat-label>
                <textarea matInput formControlName="remarks"></textarea>
            </mat-form-field>
            <div>
                <mat-checkbox formControlName="isprime">Is Prime Customer</mat-checkbox>
            </div>
            <div class="extradiv" formArrayName="address">
                <div class="header">
                    <h1>Address Info</h1>
                    <a matButton="outlined" (click)="addaddress()"><mat-icon>add</mat-icon> Add Address</a>
                </div>
                @for(item of addresslist.controls;track $index;let i=$index ){
                <mat-card class="mat-card-90" [formGroupName]="i">
                    <mat-card-header>

                        <a style="color: red;" matButton="outlined"
                            (click)="removeaddress(i)"><mat-icon>delete</mat-icon>Remove</a>

                    </mat-card-header>
                    <mat-card-content>
                        <mat-form-field class="mat-50">
                            <mat-label>City</mat-label>
                            <textarea matInput formControlName="city"></textarea>

                        </mat-form-field>
                        <!-- <mat-form-field class="mat-25">
                            <mat-label>State</mat-label>
                            <input matInput formControlName="state">
                        </mat-form-field> -->
                        <mat-form-field class="mat-25">
                            <mat-label>Country</mat-label>
                            <mat-select formControlName="country">

                                <mat-option value="">Select Country</mat-option>
                                @for(item of countries;track item){
                                <mat-option value={{item}}>{{item}}</mat-option>
                                }
                            </mat-select>
                        </mat-form-field>
                        <mat-form-field class="mat-25">
                            <mat-label>Zip Code</mat-label>
                            <input matInput formControlName="zipcode">
                        </mat-form-field>
                    </mat-card-content>
                </mat-card>
                }

            </div>
        </mat-card-content>
        <mat-card-actions>

        </mat-card-actions>
    </mat-card>
</form>
